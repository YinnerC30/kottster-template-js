version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kottster-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5480}:5480"
    environment:
      # ── App ──────────────────────────────────────────────────────────────────
      - NODE_ENV=production
      - PORT=5480

      # ── Kottster Security (REQUIRED – change before deploying!) ──────────────
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY env variable is required}
      - JWT_SECRET_SALT=${JWT_SECRET_SALT:?JWT_SECRET_SALT env variable is required}

      # ── Admin credentials ────────────────────────────────────────────────────
      - ROOT_USERNAME=${ROOT_USERNAME:-admin}
      - ROOT_PASSWORD=${ROOT_PASSWORD:?ROOT_PASSWORD env variable is required}

    # Persist the SQLite database between container restarts
    volumes:
      - kottster_data:/app/data

volumes:
  kottster_data: